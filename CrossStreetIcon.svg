<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
<title>CrossStreet Icon</title>
<defs>
<style>
.dashLines {
	stroke: yellow;
	stroke-width: 24;
	fill: none;
	stroke-dasharray: 50, 30;
}
.safety {
	fill: #F6C600;
}
.cement {
	fill: #BDBDB8;
}
</style>
<linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
	<stop offset="0%" stop-color="#2b2b2b" />
	<stop offset="100%" stop-color="#000000" />
</linearGradient>
</defs>

<rect id="bg" x="0" y="0" width="1024" height="1024" fill="url(#road)"/>

<path id="horizLine" d="
	M 0, 512
	L 170, 512
	M 854, 512
	L 1024, 512"
class="dashLines"/>

<path id="vertLines" d="
	M 512, 0
	L 512, 170
	M 512, 854
	L 512, 1024"
class="dashLines"/>

<rect id="outerCrosswalk" x="270" y="270" width="484" height="484" stroke="white" stroke-width="15" fill="none"/>
<rect id="innerCrosswalk" x="170" y="170" width="684" height="684" stroke="white" stroke-width="15" fill="none"/>

<rect id="curb" x="-300" y="-300" width="600" height="600" rx="30" ry="30" class="cement"/>
<use href="#curb" x="1024"/>
<use href="#curb" y="1024"/>
<use href="#curb" x="1024" y="1024"/>

<!-- Safety Markers -->
<rect x="170" y="240" width="100" height="60" class="safety"/>
<rect x="240" y="170" width="60" height="100" class="safety"/>

<rect x="754" y="240" width="100" height="60" class="safety"/>
<rect x="724" y="170" width="60" height="100" class="safety"/>

<rect x="170" y="724" width="100" height="60" class="safety"/>
<rect x="240" y="754" width="60" height="100" class="safety"/>

<rect x="754" y="724" width="100" height="60" class="safety"/>
<rect x="724" y="754" width="60" height="100" class="safety"/>

<text text-anchor="middle" x="512" y="590" font-size="250" font-family="Avenir Next, sans-serif" font-weight="800" fill="white" stroke="#F6C600" stroke-width="3" paint-order="stroke">CS</text></svg>